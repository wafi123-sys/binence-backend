version: '3.8'

services:
  app:
    build: .
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://binance:supersecretpassword@db:5432/binance_db
    depends_on:
      - db

  db:
    image: timescale/timescaledb:latest-pg15
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=binance
      - POSTGRES_PASSWORD=supersecretpassword
      - POSTGRES_DB=binance_db
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
